
# docker-compose.yml — EasyVisa Full Observability Stack (V9)
# MLflow runs locally (not in Docker) — start separately before docker compose up
# MLFLOW_TRACKING_URI points to your Windows host IP: 192.168.12.157

services:

  # ── FastAPI Prediction API ─────────────────────────────────────────────────
  visa-api:
    image: visa-api:v9
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: "http://192.168.12.157:5000"
      MLFLOW_MODEL_URI: "models:/easyvisa_gbm/Production"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
    volumes:
      - ./monitoring:/app/monitoring
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request, json, sys; resp = urllib.request.urlopen('http://localhost:8000/health', timeout=10); data = json.loads(resp.read()); sys.exit(0) if data.get('status') == 'healthy' else sys.exit(1)"]
      interval: 30s
      timeout: 15s
      start_period: 90s
      retries: 3
    networks:
      - monitoring
    restart: unless-stopped

  # ── Evidently Live Drift Service ───────────────────────────────────────────
  evidently-service:
    build:
      context: .
      dockerfile: monitoring/Dockerfile.evidently
    ports:
      - "8085:8085"
    volumes:
      - ./monitoring:/app/monitoring
      - ./data:/app/data:ro
    networks:
      - monitoring
    depends_on:
      - visa-api
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    depends_on:
      - visa-api
      - evidently-service

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: easyvisa123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
