services:

  mlflow:
    image: python:3.10-slim
    entrypoint: []
    command:
      - "sh"
      - "-c"
      - "pip install mlflow==3.10.1 boto3 --quiet && mlflow server --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root s3://easyvisa-mlflow-vision-2025/mlflow-artifacts --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow.db:/mlflow/mlflow.db
    environment:
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
      MLFLOW_ALLOW_HOST_OVERRIDE: "true"
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 5


  visa-api:
    image: visa-api:v10
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      MLFLOW_MODEL_URI: "models:/easyvisa_gbm/Production"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
    volumes:
      - ./monitoring:/app/monitoring
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request, json, sys; resp = urllib.request.urlopen('http://localhost:8000/health', timeout=10); data = json.loads(resp.read()); sys.exit(0) if data.get('status') == 'healthy' else sys.exit(1)"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 5
    networks:
      - monitoring
    depends_on:
      mlflow:
        condition: service_healthy

  evidently-service:
    build:
      context: .
      dockerfile: monitoring/Dockerfile.evidently
    ports:
      - "8085:8085"
    volumes:
      - ./monitoring:/app/monitoring
      - ./data:/app/data:ro
    networks:
      - monitoring
    depends_on:
      - visa-api
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    depends_on:
      - visa-api
      - evidently-service

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: easyvisa123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge