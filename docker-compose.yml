# docker-compose.yml — EasyVisa Full Observability Stack (V9)
#
# Services:
#   visa-api           : FastAPI prediction server (port 8000)
#   evidently-service  : Live drift metrics service (port 8085)
#   prometheus         : Metrics scraper (port 9090)
#   grafana            : Dashboard visualizer (port 3000)
#
# NOTE: No 'version:' field — obsolete in Docker Compose v2+
#
# Prerequisites:
#   1. MLflow server running separately (Window 1):
#      $env:AWS_ACCESS_KEY_ID     = "AKIA..."
#      $env:AWS_SECRET_ACCESS_KEY = "..."
#      $env:AWS_DEFAULT_REGION    = "us-east-1"
#      python -m mlflow server \
#          --backend-store-uri sqlite:///mlflow.db \
#          --default-artifact-root s3://easyvisa-mlflow-vision-2025/mlflow-artifacts \
#          --host 0.0.0.0 --port 5000
#
#   2. AWS credentials exported in your shell (used by visa-api at runtime):
#      $env:AWS_ACCESS_KEY_ID     = "AKIA..."
#      $env:AWS_SECRET_ACCESS_KEY = "..."
#      $env:AWS_DEFAULT_REGION    = "us-east-1"
#
#   3. Update MLFLOW_TRACKING_URI below to your machine's actual LAN IPv4
#      (not localhost / host.docker.internal — find it with: ipconfig)
#
# Start everything:
#   docker build --no-cache -t visa-api:v9 .
#   docker-compose up -d
#
# Verify:
#   docker-compose ps
#
# Service URLs:
#   API Swagger       : http://localhost:8000/docs
#   API Health        : http://localhost:8000/health
#   API Metrics       : http://localhost:8000/metrics
#   Evidently Metrics : http://localhost:8085/metrics
#   Prometheus UI     : http://localhost:9090
#   Prometheus Targets: http://localhost:9090/targets
#   Grafana           : http://localhost:3000  (admin / easyvisa123)

services:

  # ── FastAPI Prediction API ─────────────────────────────────────────────────
  visa-api:
    image: visa-api:v9
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # ⚠️  Replace with your machine's actual LAN IPv4 (ipconfig → IPv4 Address)
      # Do NOT use localhost or host.docker.internal — Docker containers can't
      # resolve those to the host MLflow process (DNS rebinding protection).
      MLFLOW_TRACKING_URI: "http://192.168.12.158:5000"
      MLFLOW_MODEL_URI: "models:/easyvisa_gbm/Production"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
    volumes:
      # Shared monitoring folder — api.py writes inference_log.csv here,
      # evidently-service reads it for drift computation
      - ./monitoring:/app/monitoring
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request, json, sys; resp = urllib.request.urlopen('http://localhost:8000/health', timeout=10); data = json.loads(resp.read()); sys.exit(0) if data.get('status') == 'healthy' else sys.exit(1)"]
      interval: 30s
      timeout: 15s
      start_period: 90s
      retries: 3
    networks:
      - monitoring

  # ── Evidently Live Drift Service ───────────────────────────────────────────
  # Reads inference_log.csv → computes drift vs EasyVisa.csv baseline →
  # exposes Prometheus metrics on :8085/metrics every 60s
  evidently-service:
    build:
      context: .
      dockerfile: monitoring/Dockerfile.evidently
    ports:
      - "8085:8085"
    volumes:
      # Shared with visa-api — reads inference_log.csv written by api.py
      - ./monitoring:/app/monitoring
      # Reference dataset for drift baseline (read-only)
      - ./data:/app/data:ro
    networks:
      - monitoring
    depends_on:
      - visa-api
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────────
  # Scrapes /metrics from visa-api (8000) and evidently-service (8085)
  # Retains 15 days of time-series data in a named volume
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    depends_on:
      - visa-api
      - evidently-service

  # ── Grafana ────────────────────────────────────────────────────────────────
  # Dashboard 1: EasyVisa API — Production Monitoring
  # Dashboard 2: EasyVisa — Data Drift Monitoring
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: easyvisa123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
    depends_on:
      - prometheus

# ── Named volumes — survive docker-compose down ────────────────────────────
volumes:
  prometheus_data:
  grafana_data:

# ── Shared network — all services resolve each other by service name ────────
networks:
  monitoring:
    driver: bridge