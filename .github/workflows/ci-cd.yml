name: CI/CD Pipeline — V6 S3 Artifact Store

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Build Docker image
      run: docker build -t visa-api:v6 .

    - name: Test Docker image startup
      run: |
        docker run -d -p 8000:8000 \
          -e MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }} \
          -e MLFLOW_MODEL_URI=${{ secrets.MLFLOW_MODEL_URI }} \
          -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
          -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
          -e AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }} \
          --name test-container \
          visa-api:v6
        sleep 15
        curl --fail http://localhost:8000/health
        docker stop test-container
        docker rm test-container

    - name: Push to Docker Hub
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Add docker push here when ready"