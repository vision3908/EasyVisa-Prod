# k8s/deployment.yaml — EasyVisa API on EKS (2 replicas for HA)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: visa-api-deployment
  namespace: easyvisa
  labels:
    app: visa-api
    version: v10
spec:
  replicas: 1
  selector:
    matchLabels:
      app: visa-api
  template:
    metadata:
      labels:
        app: visa-api
        version: v10
    spec:
      containers:
      - name: visa-api
        image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/easyvisa-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: easyvisa-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: easyvisa-secrets
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_DEFAULT_REGION
          valueFrom:
            secretKeyRef:
              name: easyvisa-secrets
              key: AWS_DEFAULT_REGION
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: easyvisa-secrets
              key: MLFLOW_TRACKING_URI
        - name: MLFLOW_MODEL_URI
          valueFrom:
            secretKeyRef:
              name: easyvisa-secrets
              key: MLFLOW_MODEL_URI
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 90
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3