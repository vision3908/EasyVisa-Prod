apiVersion: apps/v1
kind: Deployment
metadata:
  name: visa-api-deployment
  namespace: easyvisa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: visa-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: visa-api
    spec:
      initContainers:
      - name: wait-for-model
        image: curlimages/curl:latest
        command: ['sh', '-c', 'until curl -s "http://mlflow:5000/api/2.0/mlflow/registered-models/get?name=easyvisa_gbm" | grep easyvisa_gbm; do echo waiting for model; sleep 10; done']
      containers:
      - name: visa-api
        image: 167963468596.dkr.ecr.us-east-1.amazonaws.com/easyvisa-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: easyvisa-secrets
              key: MLFLOW_TRACKING_URI
        - name: MLFLOW_MODEL_URI
          valueFrom:
            secretKeyRef:
              name: easyvisa-secrets
              key: MLFLOW_MODEL_URI
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: easyvisa-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: easyvisa-secrets
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_DEFAULT_REGION
          valueFrom:
            secretKeyRef:
              name: easyvisa-secrets
              key: AWS_DEFAULT_REGION
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 500m
