# k8s/prometheus-deployment.yaml — Prometheus on EKS with public URL
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: easyvisa
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'visa-api'
        static_configs:
          - targets: ['visa-api-service:80']
        metrics_path: '/metrics'
      - job_name: 'evidently'
        static_configs:
          - targets: ['evidently-service:8085']
        metrics_path: '/metrics'
        scrape_interval: 60s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: easyvisa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.retention.time=15d'
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
      volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: easyvisa
spec:
  type: LoadBalancer
  selector:
    app: prometheus
  ports:
  - port: 80
    targetPort: 9090