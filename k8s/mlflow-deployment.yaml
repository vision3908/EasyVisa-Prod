apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: easyvisa
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.10.0
        command: ["/bin/sh", "-c"]
        args:
          - pip install boto3 --quiet && mlflow server
            --backend-store-uri sqlite:////mlflow-data/mlflow.db
            --default-artifact-root s3://easyvisa-mlflow-vision-2025/mlflow-artifacts
            --host 0.0.0.0
            --port 5000
        ports:
        - containerPort: 5000
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: easyvisa-secrets
              key: aws-access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: easyvisa-secrets
              key: aws-secret-access-key
        - name: AWS_DEFAULT_REGION
          valueFrom:
            secretKeyRef:
              name: easyvisa-secrets
              key: aws-default-region
        volumeMounts:
        - name: mlflow-db-storage
          mountPath: /mlflow-data
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: mlflow-db-storage
        persistentVolumeClaim:
          claimName: mlflow-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: easyvisa
spec:
  selector:
    app: mlflow
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP
