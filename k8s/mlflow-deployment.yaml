# k8s/mlflow-deployment.yaml - EasyVisa V12 (ebs-immediate StorageClass)
# CHANGE FROM V11: Fixed image tag and boolean string

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: easyvisa
  labels:
    app: mlflow
spec:
  type: ClusterIP
  selector:
    app: mlflow
  ports:
  - port: 5000
    targetPort: 5000

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-db-pvc
  namespace: easyvisa
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-immediate
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: easyvisa
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.10.0
        command:
          - mlflow
          - server
          - --backend-store-uri
          - sqlite:////mlflow/mlflow.db
          #- postgresql://mlflow:easyvisa123@easyvisa-mlflow-db.c6x82666ejqw.us-east-1.rds.amazonaws.com:5432/postgres
          - --default-artifact-root
          - s3://easyvisa-mlflow-vision-2025/mlflow-artifacts
          - --host
          - 0.0.0.0
          - --port
          - "5000"
        ports:
        - containerPort: 5000
        env:
        - name: MLFLOW_DISABLE_DNS_REBINDING_PROTECTION
          value: "true"
        envFrom:
        - secretRef:
            name: easyvisa-secrets
        volumeMounts:
        - name: mlflow-db
          mountPath: /mlflow
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 500m
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 60
          periodSeconds: 30
      volumes:
      - name: mlflow-db
        emptyDir: {}
        #persistentVolumeClaim:
        # claimName: mlflow-db-pvc