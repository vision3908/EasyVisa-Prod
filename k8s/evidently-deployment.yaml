# Use a pre-seeded approach - deploy AFTER manual image build
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evidently-service
  namespace: easyvisa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evidently-service
  template:
    metadata:
      labels:
        app: evidently-service
    spec:
      containers:
      - name: evidently-service
        image: 167963468596.dkr.ecr.us-east-1.amazonaws.com/easyvisa-evidently:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8085