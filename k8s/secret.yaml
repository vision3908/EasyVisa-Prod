# k8s/secret.yaml — Never commit real values. CI/CD injects from GitHub Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: easyvisa-secrets
  namespace: easyvisa
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_IN_CICD"
  AWS_SECRET_ACCESS_KEY: "REPLACE_IN_CICD"
  AWS_DEFAULT_REGION: "us-east-1"
  MLFLOW_TRACKING_URI: "REPLACE_WITH_MLFLOW_URL"
  MLFLOW_MODEL_URI: "models:/easyvisa_gbm/Production"