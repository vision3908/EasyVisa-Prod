kind: Secret
metadata:
  name: easyvisa-secrets
  namespace: easyvisa
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_IN_CICD"
  AWS_SECRET_ACCESS_KEY: "REPLACE_IN_CICD"
  AWS_DEFAULT_REGION: "us-east-1"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  mlflow-tracking-uri: "http://mlflow:5000"
  MLFLOW_MODEL_URI: "models:/easyvisa_gbm/Production"
  mlflow-model-uri: "models:/easyvisa_gbm/Production"
  aws-access-key-id: "REPLACE_IN_CICD"
  aws-secret-access-key: "REPLACE_IN_CICD"
  aws-default-region: "us-east-1"  