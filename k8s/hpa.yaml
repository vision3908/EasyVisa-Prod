apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: visa-api-hpa
  namespace: easyvisa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: visa-api-deployment
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80