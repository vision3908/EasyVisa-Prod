global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
scrape_configs:
  - job_name: 'visa-api'
    static_configs:
      - targets: ['visa-api-service:80']
    metrics_path: '/metrics'
    scrape_interval: 15s
  - job_name: 'evidently'
    static_configs:
      - targets: [':8085']
    metrics_path: '/metrics'
    scrape_interval: 60s
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
